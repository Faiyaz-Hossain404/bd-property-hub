name: Keep API awake

# Render's free web service sleeps after ~15 minutes idle, then takes ~50s to cold
# start on the next request. This pings the API health endpoint every 10 minutes so
# the demo stays warm. The health route is @SkipThrottle and only reads an in-memory
# connection state, so the pings don't hit the rate limit or the database hard.
#
# Caveats (fine for a demo, not a real uptime SLA):
#   * GitHub delays or drops scheduled runs under load; 10 min is a best effort.
#   * GitHub disables scheduled workflows after 60 days with no repo activity.
#   * This keeps a free service always-on — acceptable for a demo, and easy to
#     remove later (delete this file or disable the workflow).
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

# Don't stack pings if a run is slow (cold start); cancel an older in-flight run.
concurrency:
  group: keepalive
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping API health (retry once to absorb a cold start)
        run: |
          url="https://bdph-api.onrender.com/api/v1/health"
          for attempt in 1 2; do
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 70 "$url")
            echo "attempt $attempt -> HTTP $code"
            if [ "$code" = "200" ]; then
              exit 0
            fi
            sleep 15
          done
          echo "API health check did not return 200"
          exit 1
